<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="ogTitle ogDesc">
  <title id="ogTitle">Apostate Leaks</title>
  <desc id="ogDesc">East Grinstead residents data, double standard on personal information</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f38"/>
      <stop offset="100%" stop-color="#0d2847"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.22" fill="none" stroke="#f97316" stroke-width="2">
    <polygon points="920,380 980,415 980,485 920,520 860,485 860,415"/>
    <polygon points="1020,280 1065,305 1065,355 1020,380 975,355 975,305"/>
    <polygon points="840,260 885,285 885,335 840,360 795,335 795,285"/>
  </g>
  <rect x="56" y="56" width="1088" height="518" rx="12" fill="rgba(0,0,0,0.18)" stroke="rgba(126,184,232,0.35)" stroke-width="2"/>
  <text x="88" y="118" fill="#ffffff" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="52" font-weight="700">Apostate Leaks</text>
  <text x="88" y="172" fill="#b8d4f0" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="600">East Grinstead &#183; residents &amp; current Scientology members</text>
  <text x="88" y="248" fill="#e7ecf3" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="500">Addresses and personal data circulated without adequate</text>
  <text x="88" y="292" fill="#e7ecf3" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="500">safeguards &#8212; with exposure often framed as the victims&apos;</text>
  <text x="88" y="336" fill="#e7ecf3" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="500">problem, not a failure of those holding the data.</text>
  <line x1="88" y1="378" x2="1112" y2="378" stroke="rgba(251,191,36,0.55)" stroke-width="2"/>
  <text x="88" y="438" fill="#fbbf24" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="28" font-weight="700">The double standard</text>
  <text x="88" y="488" fill="#fbd38d" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="500">Condemning Scientology for mishandling people&apos;s data &#8212;</text>
  <text x="88" y="532" fill="#fbd38d" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="500">while similar or worse handling continues elsewhere.</text>
  <text x="88" y="588" fill="#90cdf4" font-family="ui-monospace, Consolas, monospace" font-size="22">apostateleaks.cultpodcasts.com &#183; aggregated map only</text>
</svg>
